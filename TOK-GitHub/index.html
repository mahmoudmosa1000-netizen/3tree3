function gl(cx,cy,r,sd,n){
  return Array.from({length:n},(_,i)=>{
    const a=(sd*0.618+i*137.508)*Math.PI/180,d=Math.sqrt((i+0.5)/n)*r;
    return{x:+(cx+Math.cos(a)*d).toFixed(1),y:+(cy+Math.sin(a)*d).toFixed(1),w:5.5+(sd+i*7)%7,h:3+(sd+i*5)%4,r:(sd*31+i*43)%360,o:0.52+(sd+i*13)%6*0.08};
  });
}

// ─── Ollama streaming ──────────────────────────────────────────────────────
async function streamOllama(url,model,sys,question,onChunk){
  const ac=new AbortController();
  const tid=setTimeout(()=>ac.abort(),90000);
  try{
    const res=await fetch(url+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},signal:ac.signal,
      body:JSON.stringify({model,messages:[{role:"system",content:sys},{role:"user",content:question}],stream:true,options:{temperature:0.75,num_predict:220}})});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const reader=res.body.getReader(),dec=new TextDecoder();
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value,{stream:true}).split("\n").filter(Boolean)){
        try{const d=JSON.parse(line);if(d.message?.content)onChunk(d.message.content);}catch{}
      }
    }
  }finally{clearTimeout(tid);}
}

    svg.selectAll(".gx-links path").attr("stroke-opacity",d=>fids.has(d.source.id)&&fids.has(d.target.id)?0.28:0.04);
  },[filtered,selId]);

  return <svg ref={svgRef} viewBox="0 0 800 582" style={{width:"100%",height:"100%"}} preserveAspectRatio="xMidYMid meet"/>;
}

    const opts=shuffle([correct,...wrongs]);
    let prompt="",sub="";
    if(type==="quote"){prompt="\u00BB"+correct.quote+"\u00AB";sub=ql.q;}
    else if(type==="idea"){const id=correct.ideas[Math.floor(Math.random()*correct.ideas.length)];prompt="\u201E"+id+"\u201C";sub=ql.i;}
    else{prompt=correct.era+" ("+correct.life+")";sub=ql.e;}
    setQdata({prompt,sub,opts:opts.map(p=>({id:p.id,label:p.name,life:p.life,c:p.c,ok:p.id===correct.id})),color:correct.c,cid:correct.id,cname:correct.name});
    setChosen(null);
  }
  useEffect(()=>{next();},[lang]);

  function pick(opt){
    if(chosen)return;
    setChosen(opt.id);
    const ns={c:score.c+(opt.ok?1:0),t:score.t+1,s:opt.ok?score.s+1:0};
    setScore(ns);
    localStorage.setItem("tok-score",JSON.stringify(ns));
  }

  useEffect(()=>{
    const h=(e)=>{
      if(document.activeElement&&["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName))return;
      if(qdata&&["1","2","3","4"].includes(e.key)){const i=parseInt(e.key)-1;if(qdata.opts[i])pick(qdata.opts[i]);}
      if((e.key==="n"||e.key===" ")&&chosen){e.preventDefault();next();}
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[qdata,chosen,score]);

  if(!qdata)return null;
  const done=!!chosen;const won=done&&qdata.opts.find(o=>o.id===chosen)?.ok;
  const pct=score.t>0?Math.round(score.c/score.t*100):0;

  return(
    <div dir={isRtl?"rtl":"ltr"} style={{height:"100%",overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",gap:20,background:"radial-gradient(ellipse 80% 60% at 50% 100%,#0A1F0C 0%,#060B08 70%)"}}>
      <div style={{display:"flex",gap:14,alignItems:"center",background:"rgba(10,20,12,.8)",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"12px 20px"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:900,color:"#C9A227",fontFamily:"'Playfair Display',Georgia,serif"}}>{score.c}<span style={{fontSize:13,color:"#3D5A3F"}}>/{score.t}</span></div>
          <div style={{fontSize:9,color:"#3D5A3F",letterSpacing:2,textTransform:"uppercase"}}>{qr.sc}</div>
        </div>
        <div style={{width:1,height:38,background:"rgba(255,255,255,.08)"}}/>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:900,color:score.s>=5?"#F87171":score.s>=2?"#F59E0B":"#3D5A3F",fontFamily:"'Playfair Display',Georgia,serif"}}>{score.s}</div>
          <div style={{fontSize:9,color:"#3D5A3F",letterSpacing:2,textTransform:"uppercase"}}>{qr.str}</div>
        </div>
        {score.t>0&&(
          <React.Fragment>
            <div style={{width:1,height:38,background:"rgba(255,255,255,.08)"}}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:24,fontWeight:900,color:"#34D399",fontFamily:"'Playfair Display',Georgia,serif"}}>{pct}<span style={{fontSize:12}}>%</span></div>
              <div style={{fontSize:9,color:"#3D5A3F",letterSpacing:2,textTransform:"uppercase"}}>{qr.acc}</div>
            </div>
          </React.Fragment>
        )}
        <div style={{width:1,height:38,background:"rgba(255,255,255,.08)"}}/>
        <button onClick={()=>{const z={c:0,t:0,s:0};setScore(z);localStorage.setItem("tok-score",JSON.stringify(z));}} style={{background:"none",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#3D5A3F",fontSize:11,padding:"6px 11px",cursor:"pointer"}}>{qr.reset}</button>
      </div>

      <div style={{maxWidth:580,width:"100%",background:"rgba(8,15,10,.9)",border:"1px solid rgba(201,162,39,.22)",borderRadius:20,padding:"30px 26px",backdropFilter:"blur(20px)",boxShadow:"0 24px 64px rgba(0,0,0,.5)"}}>
        <div style={{fontSize:10,letterSpacing:3,color:qdata.color,textTransform:"uppercase",textAlign:"center",marginBottom:14,fontFamily:"Inter,sans-serif"}}>{qdata.sub}</div>
        <div style={{minHeight:90,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:26,padding:"0 4px"}}>
          <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:lang==="ar"?17:19,fontWeight:700,color:"#F0E6D3",textAlign:"center",lineHeight:1.55}}>{qdata.prompt}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {qdata.opts.map((opt,i)=>{
            let bg="rgba(255,255,255,.05)",bc="rgba(255,255,255,.1)",fc="#9AB09C";
            if(done){
              if(opt.ok){bg="rgba(74,222,128,.14)";bc="#4ADE80";fc="#4ADE80";}
              else if(opt.id===chosen){bg="rgba(248,113,113,.12)";bc="#F87171";fc="#F87171";}
              else{bg="rgba(255,255,255,.02)";bc="rgba(255,255,255,.05)";fc="#3D5A3F";}
            }
            return(
              <button key={opt.id} onClick={()=>pick(opt)} style={{background:bg,border:"1px solid "+bc,borderRadius:12,padding:"14px 12px",color:fc,fontFamily:"Inter,sans-serif",fontSize:12.5,fontWeight:done&&opt.ok?700:400,textAlign:"center",lineHeight:1.4,cursor:done?"default":"pointer",transition:"all .25s"}}>
                <span style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                  <span>{opt.label}</span>
                  {!done&&<span style={{fontSize:9,opacity:0.3,background:"rgba(255,255,255,.08)",borderRadius:4,padding:"1px 5px"}}>{i+1}</span>}
                </span>
                {done&&opt.ok&&<span style={{display:"block",fontSize:9.5,marginTop:3,opacity:0.65}}>{opt.life}</span>}
              </button>
            );
          })}
        </div>
        {done&&(
          <div className="air" style={{marginTop:22,textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"'Playfair Display',Georgia,serif",color:won?"#4ADE80":"#F87171",marginBottom:won?0:6}}>{won?qr.right:qr.wrong}</div>
            {!won&&<p style={{fontSize:13,color:"#8EA88F",marginBottom:10,fontFamily:"Inter,sans-serif"}}>{"\u2192"} {qdata.cname}</p>}
            <button onClick={next} style={{marginTop:12,background:"#C9A227",border:"none",borderRadius:10,color:"#06090A",fontWeight:700,fontSize:14,padding:"12px 34px",cursor:"pointer",fontFamily:"Inter,sans-serif"}}>{qr.next}</button>
          </div>
        )}
      </div>

      {score.t>0&&(
        <div style={{maxWidth:320,width:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#2E4A30",marginBottom:5,fontFamily:"Inter,sans-serif"}}>
            <span>{score.t} {qr.qs}</span><span>{score.c} {qr.sc}</span>
          </div>
          <div style={{height:3,background:"rgba(255,255,255,.07)",borderRadius:2}}>
            <div style={{height:"100%",width:pct+"%",background:"linear-gradient(to right,#C9A227,#4ADE80)",borderRadius:2,transition:"width .6s ease"}}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Ollama Modal ──────────────────────────────────────────────────────────
const MODELS=["llama3","llama3.1","llama3.2","mistral","phi3","phi4","gemma2","qwen2.5","deepseek-r1"];
function OllamaModal({url,model,onSave,onClose,t}){
  const [lu,setLu]=useState(url);
  const [lm,setLm]=useState(model);
  const [st,setSt]=useState("");
  const IS={background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#F0E6D3",fontFamily:"Inter,sans-serif",fontSize:13,padding:"9px 12px",width:"100%",outline:"none"};
  const test=async()=>{
    setSt("Verbinde…");
    try{
      const ac=new AbortController();
      setTimeout(()=>ac.abort(),4000);
      const r=await fetch(lu+"/api/tags",{signal:ac.signal});
      const d=await r.json();
      setSt(r.ok?"\u2713 Verbunden \u00B7 "+(d.models?.length||0)+" Modell(e)":"\u2717 HTTP "+r.status);
    }catch{setSt("\u2717 Nicht erreichbar \u2014 OLLAMA_ORIGINS=* ollama serve");}
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:440,maxWidth:"92vw",borderRadius:16,padding:"28px 26px",background:"#0A140C",border:"1px solid rgba(201,162,39,.28)"}}>
        <h3 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:900,color:"#F0E6D3",marginBottom:6}}>{"\uD83E\uDD99"} Lokale KI \u2014 Ollama</h3>
        <p style={{fontSize:12,color:"#3D5A3F",marginBottom:22,lineHeight:1.6}}>Kein API-Key. Kein Cloud. Die KI l\u00E4uft auf deinem Rechner.</p>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:10,letterSpacing:2.5,color:"#3D5A3F",textTransform:"uppercase",display:"block",marginBottom:6}}>URL</label>
          <input value={lu} onChange={e=>setLu(e.target.value)} style={IS}/>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{fontSize:10,letterSpacing:2.5,color:"#3D5A3F",textTransform:"uppercase",display:"block",marginBottom:6}}>Modell</label>
          <select value={lm} onChange={e=>setLm(e.target.value)} style={IS}>{MODELS.map(m=><option key={m} value={m} style={{background:"#0A1A0C"}}>{m}</option>)}</select>
        </div>
        {st&&<div style={{fontSize:12,color:st.startsWith("\u2713")?"#4ADE80":"#F87171",padding:"8px 12px",background:"rgba(255,255,255,.04)",borderRadius:8,marginBottom:14}}>{st}</div>}
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:"14px",marginBottom:20}}>
          <p style={{fontSize:10,color:"#C9A227",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Terminal</p>
          {t.setup.slice(1).map((s,i)=><code key={i} style={{display:"block",fontSize:12,color:"#7ABF52",fontFamily:"monospace",background:"rgba(255,255,255,.06)",borderRadius:6,padding:"5px 10px",marginBottom:6}}>{s}</code>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={test} style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,color:"#A8C0AA",padding:"10px",fontSize:13,cursor:"pointer"}}>Verbindung testen</button>
          <button onClick={()=>{onSave(lu,lm);onClose();}} style={{flex:1,background:"#C9A227",border:"none",borderRadius:8,color:"#06090A",padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── Sidebar ───────────────────────────────────────────────────────────────
function Sidebar({p,onClose,lang,t,url,model,onConceptClick,onShare}){
  const [q,setQ]=useState("");
  const [resp,setResp]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [wikiImg,setWikiImg]=useState(null);
  const [copied,setCopied]=useState(false);
  const [portrait,setPortrait]=useState(false);
  const scrollRef=useRef(null);
  const isRtl=lang==="ar";
  const bio=lang==="en"?p.bio_en:p.bio;
  const sugg=t.sugg(p);

  useEffect(()=>{
    setWikiImg(null);
    if(!p.wiki)return;
    fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(p.wiki))
      .then(r=>r.json()).then(d=>{if(d.thumbnail?.source)setWikiImg(d.thumbnail.source);}).catch(()=>{});
  },[p.id]);

  useEffect(()=>{if(scrollRef.current&&resp)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[resp]);

  const copyQuote=()=>{navigator.clipboard.writeText("\u00BB"+p.quote+"\u00AB \u2014 "+p.name).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});};

  const ask=async(text)=>{
    const tx=(text||q).trim();if(!tx||loading)return;
    setQ(tx);setLoading(true);setResp("");setErr("");
    try{
      let full="";
      await streamOllama(url,model,t.sys(p),tx,chunk=>{full+=chunk;setResp(full);});
      if(!full)setErr(t.setup[0]);
    }catch(e){setErr(t.setup[0]+"\n"+t.setup[2]+"\n"+t.setup[3]);}
    setLoading(false);
  };

  return(
    <div className="sb" style={{position:"fixed",right:0,top:0,bottom:0,width:395,background:"rgba(4,8,5,.97)",borderLeft:"1px solid rgba(201,162,39,.18)",backdropFilter:"blur(24px)",overflowY:"auto",zIndex:200,padding:"26px 22px",direction:isRtl?"rtl":"ltr"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:p.c,textTransform:"uppercase",fontFamily:"Inter",marginBottom:5}}>{p.era}</div>
          <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:24,fontWeight:900,color:"#F0E6D3",lineHeight:1.1}}>{p.name}</h2>
          <div style={{fontSize:11,color:"#3D5A3F",marginTop:3}}>{p.life}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>onShare&&onShare(p.id)} title="Link teilen" style={{background:"none",border:"none",color:"#3D5A3F",fontSize:16,cursor:"pointer"}}>🔗</button>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#3D5A3F",fontSize:18,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
      </div>

      {wikiImg&&(
        <div onClick={()=>setPortrait(true)} title="Vollbild" style={{marginBottom:18,borderRadius:12,overflow:"hidden",position:"relative",aspectRatio:"16/9",background:"#0A180C",cursor:"zoom-in"}}>
          <img src={wikiImg} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover",filter:"sepia(.1) contrast(1.05) brightness(.92)"}}/>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(4,8,5,.7) 0%,transparent 55%)"}}/>
          <div style={{position:"absolute",bottom:8,right:10,fontSize:9,color:"rgba(255,255,255,.4)",fontFamily:"Inter"}}>© Wikipedia · Klick = Vollbild</div>
        </div>
      )}

      {portrait&&(
        <div onClick={()=>setPortrait(false)} style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,.92)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(12px)",cursor:"zoom-out"}}>
          <div className="air" style={{textAlign:"center",padding:"24px 20px",maxWidth:440}}>
            <img src={wikiImg} alt={p.name} style={{maxHeight:"52vh",maxWidth:"100%",borderRadius:14,objectFit:"cover",boxShadow:"0 24px 64px rgba(0,0,0,.7)",marginBottom:22}}/>
            <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:30,fontWeight:900,color:"#F0E6D3",marginBottom:10}}>{p.name}</h2>
            <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontStyle:"italic",color:"#C0AF90",fontSize:16,lineHeight:1.6,marginBottom:10}}>{"\u00BB"}{p.quote}{"\u00AB"}</p>
            <p style={{fontSize:12,color:p.c,letterSpacing:3,textTransform:"uppercase"}}>{p.era} \u00B7 {p.life}</p>
          </div>
        </div>
      )}

      <div style={{borderLeft:isRtl?"none":"3px solid "+p.c,borderRight:isRtl?"3px solid "+p.c:"none",paddingLeft:isRtl?0:14,paddingRight:isRtl?14:0,marginBottom:22,position:"relative"}}>
        <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontStyle:"italic",color:"#C0AF90",fontSize:14,lineHeight:1.65,paddingRight:isRtl?0:32}}>{"\u00BB"}{p.quote}{"\u00AB"}</p>
        <button onClick={copyQuote} title="Zitat kopieren" style={{position:"absolute",top:0,right:isRtl?undefined:0,left:isRtl?0:undefined,background:"none",border:"none",color:copied?"#4ADE80":"#3D5A3F",fontSize:14,cursor:"pointer",transition:"color .2s"}}>{copied?"\u2713":"\u29C9"}</button>
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,letterSpacing:2.5,color:"#2E4A30",textTransform:"uppercase",fontFamily:"Inter",marginBottom:9}}>{t.k.ideas}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {p.ideas.map(idea=>(
            <span key={idea} onClick={()=>onConceptClick&&onConceptClick(idea)} title="Nach dieser Idee filtern" style={{background:p.c+"14",border:"1px solid "+p.c+"40",color:p.c,fontSize:11.5,padding:"3px 10px",borderRadius:20,cursor:"pointer",transition:"opacity .2s"}}>{idea}</span>
          ))}
        </div>
      </div>

      <div style={{marginBottom:22}}>
        <div style={{fontSize:10,letterSpacing:2.5,color:"#2E4A30",textTransform:"uppercase",fontFamily:"Inter",marginBottom:9}}>{t.k.bio}</div>
        <p style={{fontSize:13.5,lineHeight:1.72,color:"#8EA88F",fontFamily:"Inter"}}>{bio}</p>
      </div>

      {p.inf.length>0&&(
        <div style={{marginBottom:22}}>
          <div style={{fontSize:10,letterSpacing:2.5,color:"#2E4A30",textTransform:"uppercase",fontFamily:"Inter",marginBottom:9}}>{t.k.inf}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {p.inf.map(id=>PHM[id]&&(
              <span key={id} style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.12)",color:"#8AA08C",fontSize:11.5,padding:"3px 10px",borderRadius:20}}>{PHM[id].name}</span>
            ))}
          </div>
        </div>
      )}

      <div style={{height:1,background:"linear-gradient(to right,transparent,rgba(201,162,39,.25),transparent)",margin:"20px 0"}}/>

      <div>
        <div style={{fontSize:10,letterSpacing:2.5,color:"#C9A227",textTransform:"uppercase",fontFamily:"Inter",marginBottom:12,display:"flex",alignItems:"center",gap:8}}><span>◆</span>{t.k.ai}</div>
        <p style={{fontSize:12,color:"#3D5A3F",fontFamily:"Inter",marginBottom:12,lineHeight:1.5}}>{t.aiDesc(p.name)}</p>
        <p style={{fontSize:10,color:"#1A3A1C",fontFamily:"Inter",marginBottom:13}}>{"\uD83E\uDD99"} {model} · {url}</p>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:13}}>
          {sugg.map(sq=>(
            <button key={sq} onClick={()=>ask(sq)} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:8,color:"#6A8C6C",fontSize:12,padding:"8px 12px",textAlign:isRtl?"right":"left",cursor:"pointer",transition:"background .2s"}}>{sq}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12,flexDirection:isRtl?"row-reverse":"row"}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask(q)} placeholder={t.ph} dir={isRtl?"rtl":"ltr"} style={{flex:1,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"10px 12px",color:"#F0E6D3",fontSize:13,fontFamily:"Inter",outline:"none"}}/>
          <button onClick={()=>ask(q)} disabled={loading} style={{background:loading?"rgba(201,162,39,.3)":"#C9A227",border:"none",borderRadius:8,color:"#06090A",fontWeight:700,fontSize:15,padding:"10px 16px",cursor:"pointer",minWidth:44,flexShrink:0,fontFamily:"Inter"}}>{loading?"…":isRtl?"←":"→"}</button>
        </div>
        {loading&&!resp&&<p style={{padding:"12px 0",fontSize:13,color:"#3D5A3F",fontStyle:"italic",fontFamily:"Inter"}}>{t.think(p.name)}</p>}
        {(resp||err)&&(
          <div ref={scrollRef} className="air" style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:14,fontSize:13.5,lineHeight:1.72,color:err?"#F87171":"#AECBAE",fontFamily:"Inter",borderLeft:isRtl?"none":"3px solid "+p.c+"55",borderRight:isRtl?"3px solid "+p.c+"55":"none",whiteSpace:"pre-wrap",maxHeight:260,overflowY:"auto"}}>
            {err||resp}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Header ────────────────────────────────────────────────────────────────

      <div style={{flexShrink:0,direction:t.dir}}>

        <div style={{fontSize:10,letterSpacing:1.5,color:studied.size>=PH.length?"#4ADE80":"#2E4A30",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:20,padding:"5px 10px",flexShrink:0,fontFamily:"Inter"}}>
          {studied.size}/{PH.length}
        </div>
        {cFilter&&<button onClick={()=>setCFilter(null)} style={{background:"rgba(201,162,39,.15)",border:"1px solid rgba(201,162,39,.5)",borderRadius:8,color:"#C9A227",fontSize:11,padding:"5px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontFamily:"Inter"}}>
          <span>🔑</span><span style={{maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cFilter}</span><span style={{opacity:.6}}>✕</span>
        </button>}
        <button onClick={onDiscover} title={t.disc} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#2E4A30",fontSize:14,padding:"5px 9px",cursor:"pointer",lineHeight:1}}>🎲</button>
        <button onClick={()=>setParticles(p=>!p)} style={{...btn(particles),background:particles?"rgba(255,215,0,.1)":"none",border:particles?"1px solid rgba(255,215,0,.4)":"1px solid rgba(255,255,255,.1)",color:particles?"#FFD700":"#2E4A30"}}>{t.pts}</button>
        <nav style={{display:"flex",gap:2,padding:"3px",background:"rgba(255,255,255,.04)",borderRadius:10}}>
          {t.v.map((label,i)=>{const vid=["tree","mindmap","timeline","galaxy","quiz"][i];return(<button key={vid} onClick={()=>setView(vid)} style={{...btn(view===vid),whiteSpace:"nowrap"}}>{label}</button>);})}
        </nav>
        <div style={{display:"flex",gap:2,padding:"3px",background:"rgba(255,255,255,.04)",borderRadius:10}}>
          {["de","en","ar"].map(l=>(<button key={l} onClick={()=>setLang(l)} style={{...btn(lang===l),fontSize:l==="ar"?13:11}}>{T[l].l}</button>))}
        </div>
        <button onClick={onCfg} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#2E4A30",fontSize:11,padding:"6px 10px",cursor:"pointer",fontFamily:"Inter"}}>⚙ Ollama</button>
        <button onClick={onDownload} title={t.dl} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#2E4A30",fontSize:13,padding:"5px 9px",cursor:"pointer",lineHeight:1}}>⬇</button>
      </div>
    </header>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────
function App(){
  const [sel,setSel]=useState(null);
  const [view,setView]=useState("tree");
  const [lang,setLang]=useState(()=>{try{return localStorage.getItem("tok-lang")||"de";}catch{return"de";}});
  const [particles,setParticles]=useState(false);
  const [gk,setGk]=useState(0);
  const [showCfg,setShowCfg]=useState(false);
  const [url,setUrl]=useState(()=>{try{return localStorage.getItem("tok-url")||"http://localhost:11434";}catch{return"http://localhost:11434";}});
  const [model,setModel]=useState(()=>{try{return localStorage.getItem("tok-model")||"llama3";}catch{return"llama3";}});
  const [search,setSearch]=useState("");
  const [cFilter,setCFilter]=useState(null);
  const [studied,setStudied]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("tok-studied")||"[]"));}catch{return new Set();}});
  const [toast,setToast]=useState(null);

  useEffect(()=>{try{localStorage.setItem("tok-lang",lang);}catch{};},[lang]);
  useEffect(()=>{try{localStorage.setItem("tok-url",url);}catch{};},[url]);
  useEffect(()=>{try{localStorage.setItem("tok-model",model);}catch{};},[model]);

  const t=T[lang];
  const filtered=cFilter?PH.filter(p=>p.ideas.some(i=>i.toLowerCase().includes(cFilter.toLowerCase()))):search.trim()?PH.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.era.toLowerCase().includes(search.toLowerCase())||p.ideas.some(i=>i.toLowerCase().includes(search.toLowerCase()))):PH;
  const ph=PHM[sel];

  const showToast=(msg,dur=3500)=>{setToast(msg);setTimeout(()=>setToast(null),dur);};

  const onSel=(id)=>{
    setSel(prev=>{
      if(prev===id)return null;
      if(id){
        const ns=new Set([...studied,id]);
        setStudied(ns);
        try{localStorage.setItem("tok-studied",JSON.stringify([...ns]));}catch{}
        if(ns.size>=PH.length)setTimeout(()=>showToast("\uD83C\uDF89 Alle "+PH.length+" Philosophen erkundet!"),400);
      }
      return id;
    });
  };

  const switchView=(v)=>{setView(v);if(v==="tree")setGk(k=>k+1);};

  const discoverRandom=()=>{
    const pool=PH.filter(p=>!studied.has(p.id));
    const pick=(pool.length>0?pool:PH)[Math.floor(Math.random()*((pool.length>0?pool:PH).length))];
    onSel(pick.id);if(view!=="tree")switchView("tree");
    showToast("\uD83C\uDFB2 "+pick.name+" \u00B7 "+pick.era,2500);
  };

  const shareLink=(pid)=>{
    const u=location.origin+location.pathname+"#philosopher="+pid;
    navigator.clipboard.writeText(u).then(()=>showToast("\uD83D\uDD17 Link kopiert!")).catch(()=>showToast("\uD83D\uDD17 "+u));
  };

  const downloadSelf=()=>{
    try{
      const blob=new Blob([document.documentElement.outerHTML],{type:"text/html;charset=utf-8"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tree-of-knowledge.html";a.click();URL.revokeObjectURL(a.href);
      showToast("\u2B07 tree-of-knowledge.html gespeichert");
    }catch(e){showToast("Download fehlgeschlagen");}
  };

  useEffect(()=>{
    const hash=location.hash.replace("#","");
    const params=new URLSearchParams(hash);
    const pid=params.get("philosopher");if(pid&&PHM[pid])setSel(pid);
    const v=params.get("view");if(v&&["tree","mindmap","timeline","galaxy","quiz"].includes(v))setView(v);
  },[]);

  useEffect(()=>{
    const params=new URLSearchParams();
    if(sel)params.set("philosopher",sel);
    if(view!=="tree")params.set("view",view);
    const hash=params.toString();
    try{history.replaceState(null,"",hash?"#"+hash:location.pathname);}catch{}
  },[sel,view]);

  useEffect(()=>{
    const h=(e)=>{
      if(document.activeElement&&["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName))return;
      if(e.key==="Escape"){setSel(null);setCFilter(null);setSearch("");}
      const vm={t:"tree",m:"mindmap",l:"timeline",g:"galaxy",q:"quiz"};
      if(vm[e.key.toLowerCase()]&&!e.ctrlKey&&!e.metaKey&&!e.altKey)switchView(vm[e.key.toLowerCase()]);
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);

  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse 100% 70% at 50% 100%,#0D2212 0%,#060B08 58%)",color:"#F0E6D3",overflow:"hidden"}}>
      <Header lang={lang} setLang={setLang} view={view} setView={switchView} particles={particles} setParticles={setParticles} t={t} search={search} setSearch={setSearch} studied={studied} onDiscover={discoverRandom} onDownload={downloadSelf} cFilter={cFilter} setCFilter={setCFilter} onCfg={()=>setShowCfg(true)}/>
      <main style={{height:"calc(100vh - 56px)",paddingRight:ph?395:0,transition:"padding-right .32s cubic-bezier(.25,.46,.45,.94)",overflow:"hidden"}}>
        {view==="tree"    &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><TreeView selId={sel} onSel={onSel} gk={gk} particles={particles} t={t} filtered={filtered} studied={studied}/></div>}
        {view==="mindmap" &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><MindMapView selId={sel} onSel={onSel} studied={studied}/></div>}
        {view==="timeline"&&<div style={{width:"100%",height:"100%"}}><TimelineView selId={sel} onSel={onSel} lang={lang} filtered={filtered}/></div>}
        {view==="galaxy"  &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><GalaxyView selId={sel} onSel={onSel} filtered={filtered}/></div>}
        {view==="quiz"    &&<div style={{width:"100%",height:"100%"}}><QuizView lang={lang}/></div>}
      </main>
      {ph&&<Sidebar key={ph.id+"-"+lang} p={ph} onClose={()=>setSel(null)} lang={lang} t={t} url={url} model={model} onConceptClick={idea=>{setCFilter(idea);setSel(null);}} onShare={shareLink}/>}
      {showCfg&&<OllamaModal url={url} model={model} onSave={(u,m)=>{setUrl(u);setModel(m);}} onClose={()=>setShowCfg(false)} t={t}/>}
      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"rgba(6,12,8,.96)",border:"1px solid rgba(201,162,39,.4)",borderRadius:12,padding:"12px 24px",zIndex:500,color:"#F0E6D3",fontFamily:"Inter,sans-serif",fontSize:13.5,whiteSpace:"nowrap",animation:"fadeUp .3s ease both",boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
